# TallyPrime Data Import: Sales & Purchase
# Requires: Active Stock Items, Ledgers, and Tax Ledgers
transactions:
  # Sales Invoice for 1 Customer
  - voucher_type: "Sales"
    date: "1-Apr-2025"
    invoice_no: "SAL-001"
    party_ledger: "Customer A" # Debtor
    sales_ledger: "Sales Account"
    inventory:
      - item_name: "Product X"
        quantity: 10
        rate: 100
        amount: 1000
    ledger_allocations:
      - ledger_name: "Output CGST"
        amount: 90
      - ledger_name: "Output SGST"
        amount: 90
    narration: "Sold 10 Nos of Product X to Customer A"

  # Purchase Invoice for the same Supplier
  - voucher_type: "Purchase"
    date: "2-Apr-2025"
    invoice_no: "PUR-001"
    party_ledger: "Supplier B" # Creditor
    purchase_ledger: "Purchase Account"
    inventory:
      - item_name: "Raw Material Y"
        quantity: 50
        rate: 20
        amount: 1000
    ledger_allocations:
      - ledger_name: "Input CGST"
        amount: 90
      - ledger_name: "Input SGST"
        amount: 90
    narration: "Purchased Raw Material Y from Supplier B"
